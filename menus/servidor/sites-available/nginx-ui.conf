server {
    listen 80;
    listen [::]:80;
    server_name host.ospro.pt;
    return 301 https://$host$request_uri;
}
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
server {
    server_name host.ospro.pt;
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    http2 on;
    #ssl_certificate /etc/ssl/certs/ospro.pt.pem;
    #ssl_certificate_key /etc/ssl/private/ospro.pt.key;
    ssl_certificate /etc/nginx/ssl/ospro.pt_P256/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/ospro.pt_P256/private.key;
    error_page 402 =301 http://redir.vigaristas.pt/index.php;
    # Define the properties
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    set $valido 0;
    if ($proxy_add_x_forwarded_for = "192.168.0.1" ) {
        set $valido 1;
    }
    #return 403;
    if ($host = 51.91.248.109) {
        #return 301 https://$host$request_uri;
        set $valido 1;
    }
    # managed by Certbot
    if ($host = host.ospro.pt) {
        #return 301 https://$host$request_uri;
        set $valido 1;
    }
    if ($valido = 0) {
        #return 200 '{"code":"1", "message": "Not Foundxxxxx"}';
        return 402;
    }
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:9000;
    }
}